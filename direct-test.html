<!DOCTYPE html>
<html>
<head>
    <title>Direct Test</title>
</head>
<body>
    <h1>Direct Component Access Test</h1>
    
    <h2>Header Component:</h2>
    <div id="header-result"></div>
    
    <h2>Footer Component:</h2>
    <div id="footer-result"></div>
    
    <script>
        async function loadComponent(url, targetId) {
            try {
                console.log("Loading component from: " + url);
                const response = await fetch(url);
                console.log("Response status: " + response.status);
                
                if (response.ok) {
                    const content = await response.text();
                    document.getElementById(targetId).innerHTML = "<pre>" + content.substring(0, 200) + "...</pre>";
                    console.log("Successfully loaded component, length: " + content.length);
                } else {
                    document.getElementById(targetId).innerHTML = "<p style='color: red;'>Failed to load: " + response.status + " " + response.statusText + "</p>";
                }
            } catch (error) {
                console.error("Error loading component:", error);
                document.getElementById(targetId).innerHTML = "<p style='color: red;'>Error: " + error.message + "</p>";
            }
        }
        
        // Test loading components
        loadComponent("components/header.html", "header-result");
        loadComponent("../components/header.html", "footer-result");
    </script>
</body>
</html>
