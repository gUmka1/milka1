<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Услуги | Muse</title>
    <!-- Load Tailwind CSS first -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Manrope:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <!-- Load custom styles after Tailwind -->
    <link rel="stylesheet" href="styles/global.css">
    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rose-50': '#fff1f2',
                        'rose-100': '#ffe4e6',
                        'rose-200': '#fecdd3',
                        'rose-300': '#fda4af',
                        'rose-400': '#fb7185',
                        'rose-500': '#f43f5e',
                        'stone-50': '#fafaf9',
                        'stone-100': '#f5f5f4',
                        'stone-200': '#e7e5e4',
                        'stone-300': '#d6d3d1',
                        'stone-400': '#a8a29e',
                        'stone-500': '#78716c',
                        'stone-600': '#57534e',
                        'stone-700': '#44403c',
                        'stone-800': '#292524',
                        'stone-900': '#1c1917',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#faf9f6] text-stone-800 antialiased selection:bg-rose-200 selection:text-stone-900">
    <!-- Components will be injected here -->
    <div id="site-root">
        <!-- Header -->
        <div id="component-header"></div>

        <!-- Mobile Menu -->
        <div id="component-mobile-menu"></div>

        <!-- Hero Section -->
        <div id="component-hero"></div>

        <!-- Services Categories -->
        <div id="component-marquee"></div>

        <!-- Hair Services -->
        <div id="component-about"></div>

        <!-- Nail Services -->
        <div id="component-services"></div>

        <!-- Special Offers -->
        <div id="component-promo"></div>

        <!-- Experts -->
        <div id="component-team"></div>

        <!-- Testimonials -->
        <div id="component-blog"></div>

        <!-- Footer -->
        <div id="component-footer"></div>

        <!-- Modal -->
        <div id="component-modal"></div>
    </div>

    <script>
    // Improved component loader: fetches component HTML files and injects into placeholders sequentially.
    const components = [
        { id: "component-header", path: "components/header.html" },
        { id: "component-mobile-menu", path: "components/mobile-menu.html" },
        { id: "component-hero", path: "components/hero.html" },
        { id: "component-marquee", path: "components/marquee.html" },
        { id: "component-about", path: "components/about.html" },
        { id: "component-services", path: "components/services.html" },
        { id: "component-promo", path: "components/promo.html" },
        { id: "component-team", path: "components/team.html" },
        { id: "component-blog", path: "components/blog.html" },
        { id: "component-footer", path: "components/footer.html" },
        { id: "component-modal", path: "components/modal.html" }
    ];

    async function loadComponents() {
        console.log('Starting component loading...');
        for (const component of components) {
            try {
                console.log(`Loading component: ${component.path}`);
                const resp = await fetch(component.path);
                console.log(`Response status for ${component.path}: ${resp.status}`);
                if (!resp.ok) {
                    throw new Error(`HTTP error! status: ${resp.status}`);
                }
                const html = await resp.text();
                console.log(`Successfully loaded ${component.path}, length: ${html.length}`);
                document.getElementById(component.id).innerHTML = html;
            } catch (e) {
                console.error("Could not load component", component.path, e);
                // Display error in the component container
                document.getElementById(component.id).innerHTML = `<div style="padding: 20px; background: #fee; border: 1px solid #fcc; color: #c33;">Error loading component: ${component.path}<br>Error: ${e.message}</div>`;
            }
        }
        console.log('All components loaded, initializing main.js');
        // Initialize main.js after all components are loaded
        initMainJS();
    }

    function initMainJS() {
        // Create script element for main.js
        const script = document.createElement('script');
        script.src = 'scripts/main.js';
        script.onload = function() {
            console.log('Main JS loaded successfully');
        };
        script.onerror = function(e) {
            console.error('Error loading main.js', e);
        };
        document.body.appendChild(script);
    }

    // Load components when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadComponents);
    } else {
        loadComponents();
    }
    </script>
</body>
</html>
